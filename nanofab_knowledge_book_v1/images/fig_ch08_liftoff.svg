<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" font-family="'Noto Sans SC', sans-serif">
  <defs>
    <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto">
      <path d="M1,0 L4,8 L7,0" fill="#f0a050" stroke="none"/>
    </marker>
    <marker id="arrowRight" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,1 L8,4 L0,7" fill="#80d0e0" stroke="none"/>
    </marker>
    <linearGradient id="metalGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c060"/>
      <stop offset="100%" stop-color="#c09030"/>
    </linearGradient>
    <linearGradient id="solventGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#80d0e0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#80d0e0" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="350" fill="#fafbfc" rx="6"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">双层抗蚀剂剥离工艺 (Bilayer Resist Liftoff Process)</text>

  <!-- Rule annotation at bottom -->
  <text x="450" y="342" text-anchor="middle" font-size="10" fill="#b06020" font-style="italic">关键规则 / Critical Rule: 金属厚度 &lt; 1/3 抗蚀剂厚度 (Metal thickness &lt; 1/3 resist height)</text>

  <!-- ============================================================ -->
  <!-- PANEL 1: Bilayer resist patterning -->
  <!-- ============================================================ -->
  <g transform="translate(12, 42)">
    <!-- Panel border -->
    <rect x="0" y="0" width="210" height="260" fill="none" stroke="#ccc" stroke-width="0.5" rx="4"/>
    <!-- Title -->
    <text x="105" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#444">① 双层抗蚀剂图案化</text>
    <text x="105" y="33" text-anchor="middle" font-size="8.5" fill="#888">Bilayer Resist Patterning</text>

    <!-- Substrate -->
    <rect x="20" y="195" width="170" height="40" fill="#889098" rx="2"/>
    <text x="105" y="220" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">基底 Substrate</text>

    <!-- Bottom resist (LOR/PMGI) — with undercut opening -->
    <!-- Left block -->
    <rect x="20" y="135" width="55" height="60" fill="#9080b0" rx="1"/>
    <!-- Right block -->
    <rect x="135" y="135" width="55" height="60" fill="#9080b0" rx="1"/>
    <!-- Label -->
    <text x="38" y="170" font-size="7.5" fill="#fff" font-weight="bold">LOR/PMGI</text>
    <text x="140" y="170" font-size="7.5" fill="#fff" font-weight="bold">LOR/PMGI</text>

    <!-- Top resist (imaging) — narrower opening -->
    <!-- Left block -->
    <rect x="20" y="110" width="65" height="25" fill="#6090c0" rx="1"/>
    <!-- Right block -->
    <rect x="125" y="110" width="65" height="25" fill="#6090c0" rx="1"/>
    <!-- Label -->
    <text x="30" y="126" font-size="7" fill="#fff" font-weight="bold">成像抗蚀剂</text>
    <text x="130" y="126" font-size="7" fill="#fff" font-weight="bold">成像抗蚀剂</text>

    <!-- Undercut dimension lines -->
    <!-- Left undercut -->
    <line x1="75" y1="133" x2="85" y2="133" stroke="#e05050" stroke-width="0.8"/>
    <line x1="75" y1="130" x2="75" y2="136" stroke="#e05050" stroke-width="0.8"/>
    <line x1="85" y1="130" x2="85" y2="136" stroke="#e05050" stroke-width="0.8"/>
    <!-- Right undercut -->
    <line x1="125" y1="133" x2="135" y2="133" stroke="#e05050" stroke-width="0.8"/>
    <line x1="125" y1="130" x2="125" y2="136" stroke="#e05050" stroke-width="0.8"/>
    <line x1="135" y1="130" x2="135" y2="136" stroke="#e05050" stroke-width="0.8"/>

    <!-- Undercut label -->
    <line x1="80" y1="140" x2="80" y2="98" stroke="#e05050" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="80" y="93" text-anchor="middle" font-size="7.5" fill="#e05050" font-weight="bold">底切 Undercut</text>

    <!-- Overhang arrows pointing to the overhang region -->
    <path d="M60,100 Q70,105 75,112" fill="none" stroke="#e05050" stroke-width="0.7"/>
    <path d="M150,100 Q140,105 135,112" fill="none" stroke="#e05050" stroke-width="0.7"/>

    <!-- Layer legend -->
    <rect x="25" y="240" width="8" height="6" fill="#6090c0"/>
    <text x="36" y="246" font-size="6.5" fill="#555">上层 Top resist</text>
    <rect x="105" y="240" width="8" height="6" fill="#9080b0"/>
    <text x="116" y="246" font-size="6.5" fill="#555">下层 Bottom (LOR)</text>
  </g>

  <!-- ============================================================ -->
  <!-- PANEL 2: Metal evaporation -->
  <!-- ============================================================ -->
  <g transform="translate(234, 42)">
    <rect x="0" y="0" width="210" height="260" fill="none" stroke="#ccc" stroke-width="0.5" rx="4"/>
    <text x="105" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#444">② 金属蒸镀</text>
    <text x="105" y="33" text-anchor="middle" font-size="8.5" fill="#888">Metal Evaporation</text>

    <!-- Evaporation arrows -->
    <line x1="50" y1="42" x2="50" y2="80" stroke="#f0a050" stroke-width="1.5" marker-end="url(#arrowDown)"/>
    <line x1="75" y1="42" x2="75" y2="80" stroke="#f0a050" stroke-width="1.5" marker-end="url(#arrowDown)"/>
    <line x1="105" y1="42" x2="105" y2="80" stroke="#f0a050" stroke-width="1.5" marker-end="url(#arrowDown)"/>
    <line x1="135" y1="42" x2="135" y2="80" stroke="#f0a050" stroke-width="1.5" marker-end="url(#arrowDown)"/>
    <line x1="160" y1="42" x2="160" y2="80" stroke="#f0a050" stroke-width="1.5" marker-end="url(#arrowDown)"/>
    <text x="105" y="55" text-anchor="middle" font-size="7" fill="#d08020">定向蒸镀</text>
    <text x="105" y="64" text-anchor="middle" font-size="6.5" fill="#d08020">Directional Evaporation</text>

    <!-- Substrate -->
    <rect x="20" y="195" width="170" height="40" fill="#889098" rx="2"/>
    <text x="105" y="220" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">基底 Substrate</text>

    <!-- Bottom resist with undercut -->
    <rect x="20" y="135" width="55" height="60" fill="#9080b0" rx="1"/>
    <rect x="135" y="135" width="55" height="60" fill="#9080b0" rx="1"/>

    <!-- Top resist -->
    <rect x="20" y="110" width="65" height="25" fill="#6090c0" rx="1"/>
    <rect x="125" y="110" width="65" height="25" fill="#6090c0" rx="1"/>

    <!-- Metal on top of left resist -->
    <rect x="20" y="102" width="65" height="8" fill="url(#metalGrad)" rx="1"/>
    <!-- Metal on top of right resist -->
    <rect x="125" y="102" width="65" height="8" fill="url(#metalGrad)" rx="1"/>

    <!-- Metal on substrate (in the opening) — only where not shadowed -->
    <rect x="75" y="187" width="60" height="8" fill="url(#metalGrad)" rx="1"/>

    <!-- Gap indicators — show discontinuity -->
    <!-- Left gap region -->
    <rect x="75" y="135" width="10" height="52" fill="none" stroke="#e05050" stroke-width="0.6" stroke-dasharray="2,1"/>
    <!-- Right gap region -->
    <rect x="125" y="135" width="10" height="52" fill="none" stroke="#e05050" stroke-width="0.6" stroke-dasharray="2,1"/>

    <!-- Gap labels -->
    <text x="80" y="160" font-size="6" fill="#e05050" transform="rotate(-90,80,160)">间隙 Gap</text>
    <text x="130" y="160" font-size="6" fill="#e05050" transform="rotate(-90,130,160)">间隙 Gap</text>

    <!-- Metal thickness annotation -->
    <line x1="148" y1="102" x2="148" y2="110" stroke="#b08020" stroke-width="0.7"/>
    <line x1="145" y1="102" x2="151" y2="102" stroke="#b08020" stroke-width="0.7"/>
    <line x1="145" y1="110" x2="151" y2="110" stroke="#b08020" stroke-width="0.7"/>
    <text x="155" y="108" font-size="5.5" fill="#b08020">t_metal</text>

    <!-- Resist height annotation -->
    <line x1="8" y1="110" x2="8" y2="195" stroke="#666" stroke-width="0.5"/>
    <line x1="5" y1="110" x2="11" y2="110" stroke="#666" stroke-width="0.5"/>
    <line x1="5" y1="195" x2="11" y2="195" stroke="#666" stroke-width="0.5"/>
    <text x="6" y="158" font-size="5.5" fill="#666" transform="rotate(-90,6,158)">抗蚀剂高度 H</text>

    <!-- Metal label -->
    <rect x="28" y="240" width="8" height="6" fill="#d4a847"/>
    <text x="39" y="246" font-size="6.5" fill="#555">金属 Metal (Au, Al...)</text>
    <text x="105" y="255" text-anchor="middle" font-size="6" fill="#b06020">t &lt; H/3</text>
  </g>

  <!-- ============================================================ -->
  <!-- PANEL 3: Solvent liftoff -->
  <!-- ============================================================ -->
  <g transform="translate(456, 42)">
    <rect x="0" y="0" width="210" height="260" fill="none" stroke="#ccc" stroke-width="0.5" rx="4"/>
    <text x="105" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#444">③ 溶剂剥离</text>
    <text x="105" y="33" text-anchor="middle" font-size="8.5" fill="#888">Liftoff in Solvent</text>

    <!-- Solvent wash background -->
    <rect x="15" y="90" width="185" height="110" fill="#80d0e0" fill-opacity="0.12" rx="3"/>

    <!-- Solvent arrows from left side -->
    <line x1="2" y1="120" x2="18" y2="120" stroke="#80d0e0" stroke-width="1.5" marker-end="url(#arrowRight)"/>
    <line x1="2" y1="140" x2="18" y2="140" stroke="#80d0e0" stroke-width="1.5" marker-end="url(#arrowRight)"/>
    <line x1="2" y1="160" x2="18" y2="160" stroke="#80d0e0" stroke-width="1.5" marker-end="url(#arrowRight)"/>
    <line x1="2" y1="180" x2="18" y2="180" stroke="#80d0e0" stroke-width="1.5" marker-end="url(#arrowRight)"/>
    <text x="8" y="112" font-size="6.5" fill="#509090" transform="rotate(-90,8,112)">溶剂 Solvent</text>

    <!-- Substrate -->
    <rect x="20" y="195" width="170" height="40" fill="#889098" rx="2"/>
    <text x="105" y="220" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">基底 Substrate</text>

    <!-- Metal on substrate — stays -->
    <rect x="75" y="187" width="60" height="8" fill="url(#metalGrad)" rx="1"/>

    <!-- Left side — partially dissolved, lifting off -->
    <!-- Dissolving bottom resist (faded, partial) -->
    <rect x="20" y="155" width="45" height="40" fill="#9080b0" fill-opacity="0.4" rx="1"/>
    <rect x="20" y="140" width="55" height="15" fill="#6090c0" fill-opacity="0.4" rx="1"/>
    <!-- Metal on top lifting -->
    <rect x="20" y="132" width="55" height="8" fill="#d4a847" fill-opacity="0.5" rx="1"/>

    <!-- Right side — already lifting away, tilted -->
    <g transform="translate(140, 100) rotate(25)">
      <rect x="0" y="20" width="40" height="35" fill="#9080b0" fill-opacity="0.25" rx="1"/>
      <rect x="0" y="10" width="50" height="10" fill="#6090c0" fill-opacity="0.25" rx="1"/>
      <rect x="0" y="3" width="50" height="7" fill="#d4a847" fill-opacity="0.35" rx="1"/>
    </g>

    <!-- Dissolution bubbles -->
    <circle cx="55" cy="175" r="2" fill="#80d0e0" fill-opacity="0.5"/>
    <circle cx="62" cy="168" r="1.5" fill="#80d0e0" fill-opacity="0.4"/>
    <circle cx="48" cy="162" r="1.8" fill="#80d0e0" fill-opacity="0.45"/>
    <circle cx="70" cy="155" r="1.2" fill="#80d0e0" fill-opacity="0.35"/>
    <circle cx="140" cy="145" r="2" fill="#80d0e0" fill-opacity="0.4"/>
    <circle cx="148" cy="135" r="1.5" fill="#80d0e0" fill-opacity="0.35"/>

    <!-- Break-away arrows -->
    <path d="M75,140 C65,120 55,95 50,75" fill="none" stroke="#b0b0b0" stroke-width="0.7" stroke-dasharray="3,2"/>
    <text x="40" y="72" font-size="6" fill="#888">剥离 Lift off</text>
    <path d="M160,120 C170,100 175,85 180,70" fill="none" stroke="#b0b0b0" stroke-width="0.7" stroke-dasharray="3,2"/>
    <text x="165" y="67" font-size="6" fill="#888">剥离</text>

    <!-- Label: metal stays -->
    <line x1="105" y1="185" x2="105" y2="250" stroke="#b08020" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="105" y="248" text-anchor="middle" font-size="7" fill="#b08020" font-weight="bold">金属保留 Metal remains</text>
  </g>

  <!-- ============================================================ -->
  <!-- PANEL 4: Finished -->
  <!-- ============================================================ -->
  <g transform="translate(678, 42)">
    <rect x="0" y="0" width="210" height="260" fill="none" stroke="#ccc" stroke-width="0.5" rx="4"/>
    <text x="105" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#444">④ 完成</text>
    <text x="105" y="33" text-anchor="middle" font-size="8.5" fill="#888">Completed Pattern</text>

    <!-- Substrate -->
    <rect x="20" y="195" width="170" height="40" fill="#889098" rx="2"/>
    <text x="105" y="220" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">基底 Substrate</text>

    <!-- Patterned metal feature — clean sharp edges -->
    <rect x="75" y="187" width="60" height="8" fill="url(#metalGrad)" rx="0.5" stroke="#b08020" stroke-width="0.5"/>

    <!-- Sharp edge callouts -->
    <!-- Left edge -->
    <line x1="75" y1="187" x2="55" y2="165" stroke="#b08020" stroke-width="0.6"/>
    <circle cx="75" cy="187" r="1.5" fill="none" stroke="#b08020" stroke-width="0.6"/>
    <text x="30" y="162" font-size="7" fill="#b08020">锐利边缘</text>
    <text x="30" y="171" font-size="6" fill="#b08020">Sharp edge</text>

    <!-- Right edge -->
    <line x1="135" y1="187" x2="155" y2="165" stroke="#b08020" stroke-width="0.6"/>
    <circle cx="135" cy="187" r="1.5" fill="none" stroke="#b08020" stroke-width="0.6"/>
    <text x="143" y="162" font-size="7" fill="#b08020">锐利边缘</text>
    <text x="143" y="171" font-size="6" fill="#b08020">Sharp edge</text>

    <!-- Dimension lines for metal feature -->
    <line x1="75" y1="205" x2="135" y2="205" stroke="#666" stroke-width="0.5"/>
    <line x1="75" y1="202" x2="75" y2="208" stroke="#666" stroke-width="0.5"/>
    <line x1="135" y1="202" x2="135" y2="208" stroke="#666" stroke-width="0.5"/>
    <text x="105" y="213" text-anchor="middle" font-size="6.5" fill="#666">图案宽度 Pattern width</text>

    <!-- Clean surface indicators -->
    <text x="105" y="130" text-anchor="middle" font-size="9" fill="#5a9050" font-weight="bold">清洁表面</text>
    <text x="105" y="142" text-anchor="middle" font-size="8" fill="#5a9050">Clean Surface</text>

    <!-- Check mark -->
    <circle cx="105" cy="105" r="14" fill="none" stroke="#5a9050" stroke-width="1.5"/>
    <path d="M96,105 L102,112 L115,96" fill="none" stroke="#5a9050" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Metal label -->
    <rect x="80" y="240" width="8" height="6" fill="#d4a847"/>
    <text x="92" y="246" font-size="6.5" fill="#555">金属图案 Metal pattern</text>
  </g>

  <!-- Process flow arrows between panels -->
  <g fill="#aaa">
    <polygon points="225,172 233,165 233,169 241,169 241,175 233,175 233,179"/>
    <polygon points="447,172 455,165 455,169 463,169 463,175 455,175 455,179"/>
    <polygon points="669,172 677,165 677,169 685,169 685,175 677,175 677,179"/>
  </g>
</svg>