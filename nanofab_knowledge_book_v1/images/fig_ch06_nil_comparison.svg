<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" font-family="'Noto Sans SC', 'Helvetica Neue', sans-serif">
  <defs>
    <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto">
      <path d="M0,0 L4,8 L8,0" fill="#d05050" stroke="none"/>
    </marker>
    <marker id="arrowUV" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto">
      <path d="M0,0 L4,8 L8,0" fill="#9070d0" stroke="none"/>
    </marker>
    <linearGradient id="uvGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9070d0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#9070d0" stop-opacity="0.1"/>
    </linearGradient>
    <!-- Hatch pattern for transparent mold -->
    <pattern id="quartzHatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <rect width="6" height="6" fill="#a0c8e8" fill-opacity="0.35"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="#7ab0d8" stroke-width="1" stroke-opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" fill="#fafbfc" rx="6"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a2332">纳米压印光刻工艺对比 — T-NIL vs UV-NIL Process Comparison</text>

  <!-- Dividing line -->
  <line x1="400" y1="42" x2="400" y2="530" stroke="#ccd0d5" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Column headers -->
  <text x="200" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a2332">热压印 T-NIL</text>
  <text x="200" y="73" text-anchor="middle" font-size="10" fill="#556070">Thermal Nanoimprint</text>
  <text x="600" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a6090">紫外压印 UV-NIL</text>
  <text x="600" y="73" text-anchor="middle" font-size="10" fill="#556070">UV Nanoimprint</text>

  <!-- ==================== T-NIL LEFT COLUMN ==================== -->

  <!-- Step 1: Heat + mold approach -->
  <text x="68" y="98" font-size="14" font-weight="bold" fill="#c06020">①</text>
  <text x="84" y="98" font-size="10" fill="#444">加热至 T > T<tspan font-size="8" baseline-shift="sub">g</tspan></text>
  <text x="84" y="110" font-size="8" fill="#888">Heat above Tg</text>
  <!-- Substrate -->
  <rect x="100" y="148" width="200" height="20" fill="#889098" rx="1"/>
  <text x="200" y="162" text-anchor="middle" font-size="8" fill="#fff">Substrate 基板</text>
  <!-- Thermoplastic resist -->
  <rect x="100" y="132" width="200" height="16" fill="#e09050" rx="1"/>
  <text x="200" y="143" text-anchor="middle" font-size="7.5" fill="#fff">热塑性胶 Thermoplastic</text>
  <!-- Mold approaching (with features) -->
  <rect x="120" y="96" width="160" height="14" fill="#1a2332" rx="1"/>
  <!-- Mold protrusions -->
  <rect x="140" y="110" width="20" height="12" fill="#1a2332"/>
  <rect x="180" y="110" width="20" height="12" fill="#1a2332"/>
  <rect x="220" y="110" width="20" height="12" fill="#1a2332"/>
  <rect x="260" y="110" width="20" height="12" fill="#1a2332"/>
  <text x="200" y="106" text-anchor="middle" font-size="7" fill="#ccc">Mold 模具</text>
  <!-- Down arrow -->
  <line x1="200" y1="85" x2="200" y2="94" stroke="#1a2332" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <!-- Heat wavy lines -->
  <path d="M95,145 Q90,140 95,135" stroke="#d05050" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M92,150 Q87,145 92,140" stroke="#d05050" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M305,145 Q310,140 305,135" stroke="#d05050" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M308,150 Q313,145 308,140" stroke="#d05050" stroke-width="1" fill="none" opacity="0.6"/>

  <!-- Step 2: Press -->
  <text x="68" y="192" font-size="14" font-weight="bold" fill="#c06020">②</text>
  <text x="84" y="192" font-size="10" fill="#444">高压压印 (50–100 bar)</text>
  <text x="84" y="204" font-size="8" fill="#888">High-pressure imprint</text>
  <!-- Substrate -->
  <rect x="100" y="248" width="200" height="20" fill="#889098" rx="1"/>
  <!-- Deformed resist filling cavities -->
  <rect x="100" y="226" width="200" height="22" fill="#e09050" rx="1"/>
  <!-- Mold pressed in - cuts into resist -->
  <rect x="120" y="210" width="160" height="14" fill="#1a2332" rx="1"/>
  <rect x="140" y="224" width="20" height="10" fill="#1a2332"/>
  <rect x="180" y="224" width="20" height="10" fill="#1a2332"/>
  <rect x="220" y="224" width="20" height="10" fill="#1a2332"/>
  <rect x="260" y="224" width="20" height="10" fill="#1a2332"/>
  <!-- Resist displaced up between protrusions -->
  <rect x="160" y="220" width="20" height="6" fill="#e09050"/>
  <rect x="200" y="220" width="20" height="6" fill="#e09050"/>
  <rect x="240" y="220" width="20" height="6" fill="#e09050"/>
  <!-- Pressure arrows -->
  <line x1="150" y1="196" x2="150" y2="208" stroke="#d05050" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <line x1="200" y1="196" x2="200" y2="208" stroke="#d05050" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <line x1="250" y1="196" x2="250" y2="208" stroke="#d05050" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Step 3: Cool + demold -->
  <text x="68" y="290" font-size="14" font-weight="bold" fill="#c06020">③</text>
  <text x="84" y="290" font-size="10" fill="#444">冷却脱模</text>
  <text x="84" y="302" font-size="8" fill="#888">Cool & demold</text>
  <!-- Substrate -->
  <rect x="100" y="348" width="200" height="20" fill="#889098" rx="1"/>
  <!-- Patterned resist with imprinted features -->
  <rect x="100" y="332" width="200" height="16" fill="#e09050" rx="1"/>
  <!-- Imprinted trenches (substrate showing through) -->
  <rect x="140" y="332" width="20" height="10" fill="#889098" opacity="0.3"/>
  <rect x="180" y="332" width="20" height="10" fill="#889098" opacity="0.3"/>
  <rect x="220" y="332" width="20" height="10" fill="#889098" opacity="0.3"/>
  <rect x="260" y="332" width="20" height="10" fill="#889098" opacity="0.3"/>
  <!-- Residual layer -->
  <rect x="100" y="342" width="200" height="6" fill="#e09050" opacity="0.6"/>
  <text x="320" y="348" font-size="7" fill="#999">残余层 Residual</text>
  <!-- Mold lifted away -->
  <rect x="120" y="306" width="160" height="10" fill="#1a2332" rx="1" opacity="0.5"/>
  <rect x="140" y="316" width="20" height="6" fill="#1a2332" opacity="0.5"/>
  <rect x="180" y="316" width="20" height="6" fill="#1a2332" opacity="0.5"/>
  <rect x="220" y="316" width="20" height="6" fill="#1a2332" opacity="0.5"/>
  <rect x="260" y="316" width="20" height="6" fill="#1a2332" opacity="0.5"/>
  <!-- Up arrow showing separation -->
  <line x1="200" y1="322" x2="200" y2="310" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Step 4: RIE -->
  <text x="68" y="388" font-size="14" font-weight="bold" fill="#c06020">④</text>
  <text x="84" y="388" font-size="10" fill="#444">RIE去残余层</text>
  <text x="84" y="400" font-size="8" fill="#888">RIE residual removal</text>
  <!-- Substrate -->
  <rect x="100" y="448" width="200" height="20" fill="#889098" rx="1"/>
  <!-- Patterned resist after RIE - no residual layer, clean features -->
  <rect x="100" y="436" width="40" height="12" fill="#e09050"/>
  <rect x="160" y="436" width="20" height="12" fill="#e09050"/>
  <rect x="200" y="436" width="20" height="12" fill="#e09050"/>
  <rect x="240" y="436" width="20" height="12" fill="#e09050"/>
  <rect x="280" y="436" width="20" height="12" fill="#e09050"/>
  <!-- Exposed substrate between features -->
  <!-- RIE arrows -->
  <line x1="130" y1="410" x2="130" y2="430" stroke="#d05050" stroke-width="1.2" marker-end="url(#arrowDown)"/>
  <line x1="175" y1="410" x2="175" y2="430" stroke="#d05050" stroke-width="1.2" marker-end="url(#arrowDown)"/>
  <line x1="230" y1="410" x2="230" y2="430" stroke="#d05050" stroke-width="1.2" marker-end="url(#arrowDown)"/>
  <text x="160" y="420" text-anchor="middle" font-size="7" fill="#d05050">RIE</text>

  <!-- ==================== UV-NIL RIGHT COLUMN ==================== -->

  <!-- Step 1: Liquid resist + transparent mold -->
  <text x="468" y="98" font-size="14" font-weight="bold" fill="#2a8050">①</text>
  <text x="484" y="98" font-size="10" fill="#444">液态光固化胶</text>
  <text x="484" y="110" font-size="8" fill="#888">Liquid UV-curable resist</text>
  <!-- Substrate -->
  <rect x="500" y="148" width="200" height="20" fill="#889098" rx="1"/>
  <text x="600" y="162" text-anchor="middle" font-size="8" fill="#fff">Substrate 基板</text>
  <!-- Resist droplets -->
  <ellipse cx="520" cy="144" rx="8" ry="5" fill="#80c080"/>
  <ellipse cx="545" cy="144" rx="8" ry="5" fill="#80c080"/>
  <ellipse cx="570" cy="144" rx="8" ry="5" fill="#80c080"/>
  <ellipse cx="595" cy="144" rx="8" ry="5" fill="#80c080"/>
  <ellipse cx="620" cy="144" rx="8" ry="5" fill="#80c080"/>
  <ellipse cx="645" cy="144" rx="8" ry="5" fill="#80c080"/>
  <ellipse cx="670" cy="144" rx="8" ry="5" fill="#80c080"/>
  <ellipse cx="685" cy="144" rx="8" ry="5" fill="#80c080"/>
  <text x="600" y="140" text-anchor="middle" font-size="7" fill="#3a7040">UV胶液滴</text>
  <!-- Transparent mold approaching -->
  <rect x="520" y="96" width="160" height="14" fill="url(#quartzHatch)" stroke="#7ab0d8" stroke-width="1" rx="1"/>
  <!-- Mold protrusions -->
  <rect x="540" y="110" width="20" height="12" fill="url(#quartzHatch)" stroke="#7ab0d8" stroke-width="0.8"/>
  <rect x="580" y="110" width="20" height="12" fill="url(#quartzHatch)" stroke="#7ab0d8" stroke-width="0.8"/>
  <rect x="620" y="110" width="20" height="12" fill="url(#quartzHatch)" stroke="#7ab0d8" stroke-width="0.8"/>
  <rect x="660" y="110" width="20" height="12" fill="url(#quartzHatch)" stroke="#7ab0d8" stroke-width="0.8"/>
  <text x="600" y="106" text-anchor="middle" font-size="7" fill="#3a7090">Quartz 石英模具</text>
  <!-- Down arrow -->
  <line x1="600" y1="85" x2="600" y2="94" stroke="#7ab0d8" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Step 2: Capillary fill -->
  <text x="468" y="192" font-size="14" font-weight="bold" fill="#2a8050">②</text>
  <text x="484" y="192" font-size="10" fill="#444">低压毛细填充 (&lt;1 bar)</text>
  <text x="484" y="204" font-size="8" fill="#888">Low-pressure capillary fill</text>
  <!-- Substrate -->
  <rect x="500" y="248" width="200" height="20" fill="#889098" rx="1"/>
  <!-- Liquid resist filling cavities -->
  <rect x="500" y="226" width="200" height="22" fill="#80c080" rx="1"/>
  <!-- Transparent mold in contact -->
  <rect x="520" y="210" width="160" height="14" fill="url(#quartzHatch)" stroke="#7ab0d8" stroke-width="1" rx="1"/>
  <rect x="540" y="224" width="20" height="10" fill="url(#quartzHatch)" stroke="#7ab0d8" stroke-width="0.8"/>
  <rect x="580" y="224" width="20" height="10" fill="url(#quartzHatch)" stroke="#7ab0d8" stroke-width="0.8"/>
  <rect x="620" y="224" width="20" height="10" fill="url(#quartzHatch)" stroke="#7ab0d8" stroke-width="0.8"/>
  <rect x="660" y="224" width="20" height="10" fill="url(#quartzHatch)" stroke="#7ab0d8" stroke-width="0.8"/>
  <!-- Resist displaced up between protrusions -->
  <rect x="560" y="220" width="20" height="6" fill="#80c080"/>
  <rect x="600" y="220" width="20" height="6" fill="#80c080"/>
  <rect x="640" y="220" width="20" height="6" fill="#80c080"/>
  <!-- Gentle pressure arrow -->
  <line x1="600" y1="196" x2="600" y2="208" stroke="#7ab0d8" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Step 3: UV cure + demold -->
  <text x="468" y="290" font-size="14" font-weight="bold" fill="#2a8050">③</text>
  <text x="484" y="290" font-size="10" fill="#444">紫外固化 + 脱模</text>
  <text x="484" y="302" font-size="8" fill="#888">UV cure & demold</text>
  <!-- Substrate -->
  <rect x="500" y="348" width="200" height="20" fill="#889098" rx="1"/>
  <!-- Patterned resist (now cured/solid) -->
  <rect x="500" y="332" width="200" height="16" fill="#80c080" rx="1"/>
  <!-- Imprinted trenches -->
  <rect x="540" y="332" width="20" height="10" fill="#889098" opacity="0.3"/>
  <rect x="580" y="332" width="20" height="10" fill="#889098" opacity="0.3"/>
  <rect x="620" y="332" width="20" height="10" fill="#889098" opacity="0.3"/>
  <rect x="660" y="332" width="20" height="10" fill="#889098" opacity="0.3"/>
  <!-- Residual layer -->
  <rect x="500" y="342" width="200" height="6" fill="#80c080" opacity="0.6"/>
  <text x="720" y="348" font-size="7" fill="#999">残余层</text>
  <!-- Mold lifted -->
  <rect x="520" y="306" width="160" height="10" fill="url(#quartzHatch)" stroke="#7ab0d8" stroke-width="0.8" rx="1" opacity="0.5"/>
  <line x1="600" y1="322" x2="600" y2="310" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- UV arrows from above through mold -->
  <line x1="545" y1="288" x2="545" y2="303" stroke="#9070d0" stroke-width="1.5" marker-end="url(#arrowUV)"/>
  <line x1="570" y1="288" x2="570" y2="303" stroke="#9070d0" stroke-width="1.5" marker-end="url(#arrowUV)"/>
  <line x1="600" y1="288" x2="600" y2="303" stroke="#9070d0" stroke-width="1.5" marker-end="url(#arrowUV)"/>
  <line x1="630" y1="288" x2="630" y2="303" stroke="#9070d0" stroke-width="1.5" marker-end="url(#arrowUV)"/>
  <line x1="655" y1="288" x2="655" y2="303" stroke="#9070d0" stroke-width="1.5" marker-end="url(#arrowUV)"/>
  <text x="680" y="296" font-size="7" fill="#9070d0">UV λ=365nm</text>

  <!-- Step 4: RIE -->
  <text x="468" y="388" font-size="14" font-weight="bold" fill="#2a8050">④</text>
  <text x="484" y="388" font-size="10" fill="#444">RIE去残余层</text>
  <text x="484" y="400" font-size="8" fill="#888">RIE residual removal</text>
  <!-- Substrate -->
  <rect x="500" y="448" width="200" height="20" fill="#889098" rx="1"/>
  <!-- Patterned resist after RIE -->
  <rect x="500" y="436" width="40" height="12" fill="#80c080"/>
  <rect x="560" y="436" width="20" height="12" fill="#80c080"/>
  <rect x="600" y="436" width="20" height="12" fill="#80c080"/>
  <rect x="640" y="436" width="20" height="12" fill="#80c080"/>
  <rect x="680" y="436" width="20" height="12" fill="#80c080"/>
  <!-- RIE arrows -->
  <line x1="530" y1="410" x2="530" y2="430" stroke="#d05050" stroke-width="1.2" marker-end="url(#arrowDown)"/>
  <line x1="575" y1="410" x2="575" y2="430" stroke="#d05050" stroke-width="1.2" marker-end="url(#arrowDown)"/>
  <line x1="630" y1="410" x2="630" y2="430" stroke="#d05050" stroke-width="1.2" marker-end="url(#arrowDown)"/>
  <text x="560" y="420" text-anchor="middle" font-size="7" fill="#d05050">RIE</text>

  <!-- ==================== COMPARISON TABLE ==================== -->
  <rect x="40" y="490" width="720" height="16" fill="#e8ecf0" rx="3"/>
  <text x="400" y="502" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a2332">工艺参数对比 Process Parameter Comparison</text>

  <!-- Table -->
  <!-- Header row -->
  <rect x="40" y="510" width="720" height="22" fill="#1a2332" rx="2"/>
  <text x="160" y="525" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">参数 Parameter</text>
  <text x="400" y="525" text-anchor="middle" font-size="10" font-weight="bold" fill="#e09050">T-NIL 热压印</text>
  <text x="620" y="525" text-anchor="middle" font-size="10" font-weight="bold" fill="#80c080">UV-NIL 紫外压印</text>
  <!-- Vertical lines -->
  <line x1="280" y1="510" x2="280" y2="672" stroke="#ccd0d5" stroke-width="0.8"/>
  <line x1="500" y1="510" x2="500" y2="672" stroke="#ccd0d5" stroke-width="0.8"/>

  <!-- Row 1 -->
  <rect x="40" y="532" width="720" height="28" fill="#f5f7f9"/>
  <text x="160" y="548" text-anchor="middle" font-size="9.5" fill="#333">温度 Temperature</text>
  <text x="390" y="544" text-anchor="middle" font-size="9" fill="#555">&gt;T<tspan font-size="7" baseline-shift="sub">g</tspan> (80–200 °C)</text>
  <text x="390" y="556" text-anchor="middle" font-size="8" fill="#999">需加热冷却循环</text>
  <text x="620" y="548" text-anchor="middle" font-size="9" fill="#555">室温 Room temp (RT)</text>

  <!-- Row 2 -->
  <rect x="40" y="560" width="720" height="28" fill="#fff"/>
  <text x="160" y="576" text-anchor="middle" font-size="9.5" fill="#333">压力 Pressure</text>
  <text x="390" y="576" text-anchor="middle" font-size="9" fill="#555">50–100 bar</text>
  <text x="620" y="576" text-anchor="middle" font-size="9" fill="#555">&lt;1 bar</text>

  <!-- Row 3 -->
  <rect x="40" y="588" width="720" height="28" fill="#f5f7f9"/>
  <text x="160" y="604" text-anchor="middle" font-size="9.5" fill="#333">模具 Mold</text>
  <text x="390" y="600" text-anchor="middle" font-size="9" fill="#555">不透明 Opaque</text>
  <text x="390" y="612" text-anchor="middle" font-size="8" fill="#999">(Si, Ni, SiC)</text>
  <text x="620" y="600" text-anchor="middle" font-size="9" fill="#555">透明 Transparent</text>
  <text x="620" y="612" text-anchor="middle" font-size="8" fill="#999">(Quartz, Glass)</text>

  <!-- Row 4 -->
  <rect x="40" y="616" width="720" height="28" fill="#fff"/>
  <text x="160" y="632" text-anchor="middle" font-size="9.5" fill="#333">抗蚀剂 Resist</text>
  <text x="390" y="632" text-anchor="middle" font-size="9" fill="#555">热塑性 Thermoplastic</text>
  <text x="620" y="632" text-anchor="middle" font-size="9" fill="#555">紫外固化 UV-curable</text>

  <!-- Row 5 -->
  <rect x="40" y="644" width="720" height="28" fill="#f5f7f9" rx="0 0 2 2"/>
  <text x="160" y="660" text-anchor="middle" font-size="9.5" fill="#333">产率 Throughput</text>
  <text x="390" y="660" text-anchor="middle" font-size="9" fill="#555">低 Low (热循环)</text>
  <text x="620" y="660" text-anchor="middle" font-size="9" fill="#555">高 High (无需热循环)</text>

  <!-- Table border -->
  <rect x="40" y="510" width="720" height="162" fill="none" stroke="#ccd0d5" stroke-width="1" rx="2"/>

  <!-- Legend bar -->
  <rect x="50" y="680" width="10" height="8" fill="#889098" rx="1"/>
  <text x="64" y="688" font-size="7.5" fill="#666">基板 Substrate</text>
  <rect x="140" y="680" width="10" height="8" fill="#e09050" rx="1"/>
  <text x="154" y="688" font-size="7.5" fill="#666">热塑性胶</text>
  <rect x="210" y="680" width="10" height="8" fill="#80c080" rx="1"/>
  <text x="224" y="688" font-size="7.5" fill="#666">UV胶</text>
  <rect x="260" y="680" width="10" height="8" fill="#1a2332" rx="1"/>
  <text x="274" y="688" font-size="7.5" fill="#666">不透明模具</text>
  <rect x="340" y="680" width="10" height="8" fill="url(#quartzHatch)" stroke="#7ab0d8" stroke-width="0.5" rx="1"/>
  <text x="354" y="688" font-size="7.5" fill="#666">透明模具</text>
  <line x1="430" y1="686" x2="445" y2="686" stroke="#9070d0" stroke-width="1.5"/>
  <text x="450" y="688" font-size="7.5" fill="#666">UV光</text>
  <line x1="480" y1="686" x2="495" y2="686" stroke="#d05050" stroke-width="1.5"/>
  <text x="500" y="688" font-size="7.5" fill="#666">RIE</text>
</svg>