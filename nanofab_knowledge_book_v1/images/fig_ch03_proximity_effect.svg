<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="'Noto Sans SC', sans-serif">
  <defs>
    <!-- Gradient for electron beam -->
    <linearGradient id="beamGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#50c878" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#50c878" stop-opacity="0.6"/>
    </linearGradient>
    <!-- Forward scatter gradient -->
    <radialGradient id="fwdScatter" cx="0.5" cy="0" r="0.8">
      <stop offset="0%" stop-color="#88cc44" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#88cc44" stop-opacity="0"/>
    </radialGradient>
    <!-- Backscatter gradient -->
    <radialGradient id="backScatter" cx="0.5" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#e06040" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e06040" stop-opacity="0"/>
    </radialGradient>
    <!-- Secondary electron gradient -->
    <radialGradient id="secElectron" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#d4a040" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4a040" stop-opacity="0"/>
    </radialGradient>
    <!-- Arrowhead marker -->
    <marker id="arrowBlack" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#50c878"/>
    </marker>
    <marker id="arrowRed" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#e06040"/>
    </marker>
    <marker id="arrowYellow" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#88cc44"/>
    </marker>
    <marker id="arrowDim" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4 Z" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#fafafa"/>

  <!-- Title -->
  <text x="400" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">电子散射与邻近效应 (Electron Scattering &amp; Proximity Effect in EBL)</text>

  <!-- ============================================ -->
  <!-- LEFT SIDE: Cross-section diagram             -->
  <!-- ============================================ -->
  <text x="190" y="48" text-anchor="middle" font-size="12" font-weight="bold" fill="#444">截面示意图 (Cross-Section)</text>

  <!-- Vacuum region above resist -->
  <rect x="40" y="55" width="300" height="45" fill="#f0f4f8" stroke="none"/>
  <text x="48" y="72" font-size="8" fill="#999">真空 (Vacuum)</text>

  <!-- Resist layer -->
  <rect x="40" y="100" width="300" height="55" fill="#c0d8e8" stroke="#8099aa" stroke-width="1"/>
  <text x="345" y="122" font-size="9" fill="#446" text-anchor="start">抗蚀剂 (Resist)</text>
  <text x="345" y="134" font-size="8" fill="#668" text-anchor="start">~200 nm</text>

  <!-- Substrate -->
  <rect x="40" y="155" width="300" height="250" fill="#889098" stroke="#667078" stroke-width="1"/>
  <text x="345" y="175" font-size="9" fill="#556" text-anchor="start">基底 (Substrate)</text>
  <text x="345" y="187" font-size="8" fill="#778" text-anchor="start">Si</text>

  <!-- Resist thickness dimension line -->
  <line x1="35" y1="100" x2="35" y2="155" stroke="#666" stroke-width="0.7"/>
  <line x1="32" y1="100" x2="38" y2="100" stroke="#666" stroke-width="0.7"/>
  <line x1="32" y1="155" x2="38" y2="155" stroke="#666" stroke-width="0.7"/>
  <text x="30" y="131" text-anchor="end" font-size="7" fill="#555">200 nm</text>

  <!-- Incoming electron beam (narrow column) -->
  <polygon points="182,30 198,30 196,100 184,100" fill="url(#beamGrad)" stroke="#3a9a5a" stroke-width="0.8" opacity="0.85"/>
  <!-- Beam label -->
  <text x="155" y="42" text-anchor="end" font-size="9" fill="#2a7a4a" font-weight="bold">e⁻ beam</text>
  <line x1="157" y1="40" x2="178" y2="40" stroke="#2a7a4a" stroke-width="0.7" marker-end="url(#arrowGreen)"/>
  <!-- Beam diameter label -->
  <line x1="184" y1="95" x2="196" y2="95" stroke="#333" stroke-width="0.5"/>
  <text x="190" y="91" text-anchor="middle" font-size="6.5" fill="#333">~5-50 nm</text>

  <!-- Forward scattering cone in resist -->
  <polygon points="184,100 196,100 206,155 174,155" fill="url(#fwdScatter)" stroke="#88cc44" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.7"/>

  <!-- Forward scatter trajectories -->
  <line x1="190" y1="100" x2="178" y2="148" stroke="#88cc44" stroke-width="0.6" opacity="0.6"/>
  <line x1="190" y1="100" x2="185" y2="150" stroke="#88cc44" stroke-width="0.6" opacity="0.5"/>
  <line x1="190" y1="100" x2="195" y2="150" stroke="#88cc44" stroke-width="0.6" opacity="0.5"/>
  <line x1="190" y1="100" x2="202" y2="148" stroke="#88cc44" stroke-width="0.6" opacity="0.6"/>
  <line x1="190" y1="100" x2="190" y2="152" stroke="#88cc44" stroke-width="0.6" opacity="0.4"/>

  <!-- Forward scatter label -->
  <text x="75" y="118" font-size="8.5" fill="#5a8a22" font-weight="bold">前散射</text>
  <text x="75" y="129" font-size="7" fill="#5a8a22">(Forward Scattering)</text>
  <text x="75" y="142" font-size="7" fill="#5a8a22">α ≈ 10–20 nm</text>
  <line x1="130" y1="130" x2="175" y2="130" stroke="#88cc44" stroke-width="0.7" stroke-dasharray="2,2" marker-end="url(#arrowYellow)"/>

  <!-- Deep penetration + backscattering cloud in substrate -->
  <!-- Main penetration path -->
  <line x1="190" y1="155" x2="190" y2="340" stroke="#50c878" stroke-width="0.8" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="190" y1="155" x2="160" y2="300" stroke="#50c878" stroke-width="0.5" opacity="0.3" stroke-dasharray="3,3"/>
  <line x1="190" y1="155" x2="220" y2="310" stroke="#50c878" stroke-width="0.5" opacity="0.3" stroke-dasharray="3,3"/>
  <line x1="190" y1="155" x2="145" y2="260" stroke="#50c878" stroke-width="0.4" opacity="0.2" stroke-dasharray="3,3"/>
  <line x1="190" y1="155" x2="235" y2="270" stroke="#50c878" stroke-width="0.4" opacity="0.2" stroke-dasharray="3,3"/>

  <!-- Backscatter cloud (wide ellipse) -->
  <ellipse cx="190" cy="250" rx="120" ry="110" fill="url(#backScatter)" stroke="#e06040" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Backscattered electron trajectories going back UP -->
  <line x1="170" y1="280" x2="110" y2="155" stroke="#e06040" stroke-width="0.7" opacity="0.5" marker-end="url(#arrowRed)"/>
  <line x1="210" y1="270" x2="260" y2="155" stroke="#e06040" stroke-width="0.7" opacity="0.5" marker-end="url(#arrowRed)"/>
  <line x1="150" y1="240" x2="95" y2="155" stroke="#e06040" stroke-width="0.7" opacity="0.4" marker-end="url(#arrowRed)"/>
  <line x1="230" y1="250" x2="285" y2="155" stroke="#e06040" stroke-width="0.7" opacity="0.4" marker-end="url(#arrowRed)"/>
  <line x1="185" y1="300" x2="140" y2="155" stroke="#e06040" stroke-width="0.6" opacity="0.35" marker-end="url(#arrowRed)"/>
  <line x1="200" y1="290" x2="240" y2="155" stroke="#e06040" stroke-width="0.6" opacity="0.35" marker-end="url(#arrowRed)"/>

  <!-- Backscatter exposure zone in resist (wide band) -->
  <rect x="80" y="100" width="220" height="55" fill="#e06040" opacity="0.08" stroke="none"/>
  <!-- Arrows showing unwanted exposure width -->
  <line x1="90" y1="148" x2="290" y2="148" stroke="#e06040" stroke-width="0.7" stroke-dasharray="2,2"/>
  <text x="190" y="165" text-anchor="middle" font-size="6.5" fill="#c04030" font-style="italic">背散射引起的额外曝光区</text>

  <!-- Backscatter label -->
  <text x="75" y="240" font-size="8.5" fill="#c04030" font-weight="bold">背散射</text>
  <text x="75" y="251" font-size="7" fill="#c04030">(Backscattering)</text>
  <text x="75" y="264" font-size="7" fill="#c04030">β ≈ 1–10 μm</text>
  <text x="75" y="277" font-size="7" fill="#c04030">(与加速电压相关)</text>

  <!-- Secondary electrons -->
  <circle cx="175" cy="115" r="12" fill="url(#secElectron)" stroke="#d4a040" stroke-width="0.5" stroke-dasharray="2,2"/>
  <circle cx="205" cy="120" r="10" fill="url(#secElectron)" stroke="#d4a040" stroke-width="0.5" stroke-dasharray="2,2"/>
  <circle cx="160" cy="125" r="8" fill="url(#secElectron)" stroke="#d4a040" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="230" y="110" font-size="7" fill="#b08020">二次电子</text>
  <text x="230" y="120" font-size="6.5" fill="#b08020">(Secondary e⁻)</text>

  <!-- Backscatter range dimension -->
  <line x1="80" y1="400" x2="300" y2="400" stroke="#c04030" stroke-width="0.7"/>
  <line x1="80" y1="395" x2="80" y2="405" stroke="#c04030" stroke-width="0.7"/>
  <line x1="300" y1="395" x2="300" y2="405" stroke="#c04030" stroke-width="0.7"/>
  <text x="190" y="415" text-anchor="middle" font-size="7.5" fill="#c04030">背散射范围 β ≈ 1–10 μm</text>

  <!-- Forward scatter range dimension -->
  <line x1="174" y1="160" x2="206" y2="160" stroke="#5a8a22" stroke-width="0.6"/>
  <line x1="174" y1="157" x2="174" y2="163" stroke="#5a8a22" stroke-width="0.6"/>
  <line x1="206" y1="157" x2="206" y2="163" stroke="#5a8a22" stroke-width="0.6"/>
  <text x="190" y="170" text-anchor="middle" font-size="6" fill="#5a8a22">α</text>

  <!-- ============================================ -->
  <!-- RIGHT SIDE: PSF Graph                        -->
  <!-- ============================================ -->
  <text x="600" y="48" text-anchor="middle" font-size="12" font-weight="bold" fill="#444">点扩散函数 (Point Spread Function)</text>

  <!-- Graph axes -->
  <!-- Y-axis -->
  <line x1="460" y1="70" x2="460" y2="390" stroke="#333" stroke-width="1.2" marker-end="url(#arrowBlack)"/>
  <!-- X-axis -->
  <line x1="455" y1="380" x2="760" y2="380" stroke="#333" stroke-width="1.2" marker-end="url(#arrowBlack)"/>

  <!-- Y-axis label -->
  <text x="435" y="68" text-anchor="middle" font-size="9" fill="#333">f(r)</text>
  <text x="435" y="80" text-anchor="middle" font-size="7.5" fill="#666">能量密度</text>

  <!-- X-axis label -->
  <text x="760" y="398" text-anchor="middle" font-size="9" fill="#333">r</text>
  <text x="760" y="410" text-anchor="middle" font-size="7.5" fill="#666">径向距离</text>

  <!-- Y-axis tick marks and labels -->
  <line x1="456" y1="380" x2="464" y2="380" stroke="#333" stroke-width="0.8"/>
  <text x="452" y="384" text-anchor="end" font-size="7" fill="#555">0</text>

  <!-- Grid lines (subtle) -->
  <line x1="460" y1="320" x2="750" y2="320" stroke="#ddd" stroke-width="0.4"/>
  <line x1="460" y1="260" x2="750" y2="260" stroke="#ddd" stroke-width="0.4"/>
  <line x1="460" y1="200" x2="750" y2="200" stroke="#ddd" stroke-width="0.4"/>
  <line x1="460" y1="140" x2="750" y2="140" stroke="#ddd" stroke-width="0.4"/>
  <line x1="520" y1="70" x2="520" y2="380" stroke="#ddd" stroke-width="0.4"/>
  <line x1="580" y1="70" x2="580" y2="380" stroke="#ddd" stroke-width="0.4"/>
  <line x1="640" y1="70" x2="640" y2="380" stroke="#ddd" stroke-width="0.4"/>
  <line x1="700" y1="70" x2="700" y2="380" stroke="#ddd" stroke-width="0.4"/>

  <!-- PSF: Forward scattering (narrow Gaussian) - sharp peak -->
  <!-- Using polyline for the narrow peak curve -->
  <polyline points="
    460,375
    462,370
    464,358
    466,335
    468,295
    470,240
    472,180
    474,125
    476,90
    478,75
    480,72
    482,75
    484,90
    486,125
    488,180
    490,240
    492,295
    494,335
    496,358
    498,370
    500,374
    505,377
    510,378
    515,378.5
    520,379
  " fill="none" stroke="#88cc44" stroke-width="2"/>

  <!-- PSF: Backscattering (broad Gaussian) - wide tail -->
  <polyline points="
    460,345
    465,343
    470,340
    475,337
    480,333
    485,330
    490,327
    495,325
    500,323
    510,320
    520,318
    530,317
    540,316.5
    550,317
    560,318
    570,319
    580,321
    590,324
    600,327
    610,331
    620,335
    630,339
    640,343
    650,348
    660,353
    670,358
    680,362
    690,366
    700,369
    710,372
    720,374
    730,376
    740,377.5
    750,378.5
  " fill="none" stroke="#e06040" stroke-width="1.8" stroke-dasharray="6,3"/>

  <!-- PSF: Combined total (filled area hint) -->
  <polyline points="
    460,340
    462,335
    464,320
    466,295
    468,255
    470,200
    472,142
    474,92
    476,62
    478,50
    480,48
    482,50
    484,62
    486,92
    488,142
    490,200
    492,255
    494,295
    496,318
    498,333
    500,340
    505,343
    510,345
    515,345
    520,344
    530,343
    540,342
    550,342
    560,343
    570,344
    580,346
    590,349
    600,352
    610,356
    620,360
    630,364
    640,368
    650,372
    660,375
    670,377
    680,378.5
    690,379
    700,379.3
    710,379.5
    720,379.7
    730,379.8
    740,379.9
    750,380
  " fill="none" stroke="#333" stroke-width="1.2"/>

  <!-- Shaded area under forward scatter peak -->
  <polygon points="
    460,380 460,375 462,370 464,358 466,335 468,295 470,240 472,180 474,125 476,90 478,75 480,72 482,75 484,90 486,125 488,180 490,240 492,295 494,335 496,358 498,370 500,374 505,377 510,378 515,378.5 520,379 520,380
  " fill="#88cc44" opacity="0.15"/>

  <!-- Shaded area under backscatter curve -->
  <polygon points="
    460,380 460,345 465,343 470,340 475,337 480,333 485,330 490,327 495,325 500,323 510,320 520,318 530,317 540,316.5 550,317 560,318 570,319 580,321 590,324 600,327 610,331 620,335 630,339 640,343 650,348 660,353 670,358 680,362 690,366 700,369 710,372 720,374 730,376 740,377.5 750,378.5 750,380
  " fill="#e06040" opacity="0.08"/>

  <!-- Alpha width indicator -->
  <line x1="470" y1="375" x2="500" y2="375" stroke="#88cc44" stroke-width="1"/>
  <line x1="470" y1="372" x2="470" y2="378" stroke="#88cc44" stroke-width="0.8"/>
  <line x1="500" y1="372" x2="500" y2="378" stroke="#88cc44" stroke-width="0.8"/>
  <text x="485" y="373" text-anchor="middle" font-size="8" fill="#5a8a22" font-weight="bold">α</text>

  <!-- Beta width indicator -->
  <line x1="465" y1="350" x2="630" y2="350" stroke="#e06040" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="465" y1="347" x2="465" y2="353" stroke="#e06040" stroke-width="0.8"/>
  <line x1="630" y1="347" x2="630" y2="353" stroke="#e06040" stroke-width="0.8"/>
  <text x="548" y="348" text-anchor="middle" font-size="8" fill="#c04030" font-weight="bold">β</text>

  <!-- Crossover point marker -->
  <circle cx="510" cy="345" r="3.5" fill="none" stroke="#8855aa" stroke-width="1.5"/>
  <line x1="515" y1="340" x2="545" y2="318" stroke="#8855aa" stroke-width="0.7"/>
  <text x="547" y="315" font-size="7.5" fill="#8855aa">交叉点</text>
  <text x="547" y="325" font-size="6.5" fill="#8855aa">(Crossover: backscatter</text>
  <text x="547" y="334" font-size="6.5" fill="#8855aa"> dominates beyond here)</text>

  <!-- Legend -->
  <line x1="615" y1="78" x2="640" y2="78" stroke="#88cc44" stroke-width="2"/>
  <text x="645" y="82" font-size="8" fill="#5a8a22">前散射 (Forward)</text>

  <line x1="615" y1="94" x2="640" y2="94" stroke="#e06040" stroke-width="1.8" stroke-dasharray="6,3"/>
  <text x="645" y="98" font-size="8" fill="#c04030">背散射 (Backscatter)</text>

  <line x1="615" y1="110" x2="640" y2="110" stroke="#333" stroke-width="1.2"/>
  <text x="645" y="114" font-size="8" fill="#333">总和 (Total)</text>

  <!-- Eta label on backscatter peak -->
  <text x="470" y="338" text-anchor="start" font-size="8" fill="#c04030">η·(peak)</text>

  <!-- Peak label -->
  <text x="483" y="65" text-anchor="middle" font-size="7.5" fill="#5a8a22">1/α² peak</text>

  <!-- Equation box -->
  <rect x="462" y="420" width="298" height="28" rx="3" fill="#f5f5f0" stroke="#ccc" stroke-width="0.7"/>
  <text x="611" y="438" text-anchor="middle" font-size="8" fill="#333" font-style="italic">
    f(r) = [1/π(1+η)] · [1/α² · exp(−r²/α²) + η/β² · exp(−r²/β²)]
  </text>

  <!-- X-axis tick labels -->
  <text x="480" y="393" text-anchor="middle" font-size="7" fill="#555">α</text>
  <line x1="480" y1="380" x2="480" y2="385" stroke="#555" stroke-width="0.6"/>
  <text x="548" y="393" text-anchor="middle" font-size="7" fill="#555">β</text>
  <line x1="548" y1="380" x2="548" y2="385" stroke="#555" stroke-width="0.6"/>

  <!-- Parameter note -->
  <text x="190" y="437" text-anchor="middle" font-size="7.5" fill="#555">典型参数 (Typical): α ≈ 10–20 nm, β ≈ 1–10 μm, η ≈ 0.5–0.8 (for Si at 20–100 kV)</text>
</svg>