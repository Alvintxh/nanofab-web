<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 450" font-family="'Noto Sans SC', 'Helvetica Neue', sans-serif">
  <defs>
    <style>
      text { font-family: 'Noto Sans SC', 'Helvetica Neue', sans-serif; }
    </style>
    <!-- Hatch pattern for passivation -->
    <pattern id="passHatch" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
      <rect width="4" height="4" fill="#40a0a0"/>
      <line x1="0" y1="0" x2="0" y2="4" stroke="#2d7a7a" stroke-width="1"/>
    </pattern>
    <!-- Scallop clip for final result -->
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e06040"/>
    </marker>
    <marker id="arrowRepeat" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#3366aa"/>
    </marker>
    <marker id="arrowDown" markerWidth="6" markerHeight="8" refX="3" refY="8" orient="auto">
      <path d="M0,0 L6,0 L3,8 Z" fill="#e06040"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="950" height="450" fill="#fafbfc" rx="6"/>

  <!-- Title -->
  <text x="475" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a2332">Bosch 深反应离子刻蚀 (DRIE) 工艺循环  /  Bosch Deep Reactive Ion Etching Process Cycle</text>

  <!-- ============================================================ -->
  <!-- PANEL 1: SF6 Isotropic Etch -->
  <!-- ============================================================ -->
  <g transform="translate(15, 35)">
    <rect width="215" height="185" fill="#f4f6f8" stroke="#bcc4cc" stroke-width="1" rx="4"/>
    <text x="107" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a2332">① SF&#x2086;各向同性刻蚀</text>
    <text x="107" y="31" text-anchor="middle" font-size="8.5" fill="#556677">Isotropic SF&#x2086; Etch</text>

    <!-- Si substrate -->
    <rect x="20" y="70" width="175" height="105" fill="#889098" rx="2"/>
    <text x="107" y="165" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">Si</text>

    <!-- Mask -->
    <rect x="20" y="60" width="70" height="12" fill="#1a2332" rx="1"/>
    <rect x="125" y="60" width="70" height="12" fill="#1a2332" rx="1"/>
    <text x="55" y="57" text-anchor="middle" font-size="7.5" fill="#1a2332">掩模 Mask</text>

    <!-- Isotropic etch cavity (rounded bite) -->
    <ellipse cx="107" cy="72" rx="42" ry="30" fill="#fafbfc"/>
    <!-- Slight undercut under mask edges -->
    <ellipse cx="107" cy="72" rx="46" ry="25" fill="#fafbfc"/>

    <!-- Etch front glow -->
    <ellipse cx="107" cy="72" rx="46" ry="25" fill="none" stroke="#f0a050" stroke-width="2.5" stroke-dasharray="4,3" opacity="0.8"/>

    <!-- SF6 plasma arrows -->
    <line x1="95" y1="40" x2="95" y2="52" stroke="#f0a050" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <line x1="107" y1="38" x2="107" y2="50" stroke="#f0a050" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <line x1="119" y1="40" x2="119" y2="52" stroke="#f0a050" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <!-- Angled arrows showing isotropy -->
    <line x1="80" y1="42" x2="88" y2="56" stroke="#f0a050" stroke-width="1.2" marker-end="url(#arrowOrange)"/>
    <line x1="134" y1="42" x2="126" y2="56" stroke="#f0a050" stroke-width="1.2" marker-end="url(#arrowOrange)"/>

    <text x="107" y="46" text-anchor="middle" font-size="8" fill="#c07030" font-weight="bold">SF&#x2086;*</text>
  </g>

  <!-- ============================================================ -->
  <!-- PANEL 2: C4F8 Passivation -->
  <!-- ============================================================ -->
  <g transform="translate(245, 35)">
    <rect width="215" height="185" fill="#f4f6f8" stroke="#bcc4cc" stroke-width="1" rx="4"/>
    <text x="107" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a2332">② C&#x2084;F&#x2088;钝化</text>
    <text x="107" y="31" text-anchor="middle" font-size="8.5" fill="#556677">Fluorocarbon Passivation</text>

    <!-- Si substrate -->
    <rect x="20" y="70" width="175" height="105" fill="#889098" rx="2"/>
    <text x="107" y="165" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">Si</text>

    <!-- Mask -->
    <rect x="20" y="60" width="70" height="12" fill="#1a2332" rx="1"/>
    <rect x="125" y="60" width="70" height="12" fill="#1a2332" rx="1"/>

    <!-- Etch cavity -->
    <ellipse cx="107" cy="72" rx="46" ry="25" fill="#fafbfc"/>

    <!-- Passivation layer on top of mask -->
    <rect x="20" y="56" width="70" height="4" fill="#40a0a0" rx="1"/>
    <rect x="125" y="56" width="70" height="4" fill="#40a0a0" rx="1"/>

    <!-- Passivation layer conformal coating on cavity -->
    <ellipse cx="107" cy="72" rx="46" ry="25" fill="none" stroke="#40a0a0" stroke-width="5"/>

    <!-- Label passivation -->
    <line x1="165" y1="75" x2="185" y2="55" stroke="#2d7a7a" stroke-width="0.8"/>
    <text x="170" y="50" font-size="7" fill="#2d7a7a" font-weight="bold">钝化层</text>
    <text x="170" y="58" font-size="6" fill="#2d7a7a">nCF&#x2082; polymer</text>

    <!-- C4F8 label -->
    <text x="107" y="46" text-anchor="middle" font-size="8" fill="#2d7a7a" font-weight="bold">C&#x2084;F&#x2088;</text>
  </g>

  <!-- ============================================================ -->
  <!-- PANEL 3: Ion Bombardment -->
  <!-- ============================================================ -->
  <g transform="translate(475, 35)">
    <rect width="215" height="185" fill="#f4f6f8" stroke="#bcc4cc" stroke-width="1" rx="4"/>
    <text x="107" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a2332">③ 离子轰击去除底部钝化</text>
    <text x="107" y="31" text-anchor="middle" font-size="8.5" fill="#556677">Directional Ion Bombardment</text>

    <!-- Si substrate -->
    <rect x="20" y="70" width="175" height="105" fill="#889098" rx="2"/>
    <text x="107" y="165" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">Si</text>

    <!-- Mask -->
    <rect x="20" y="60" width="70" height="12" fill="#1a2332" rx="1"/>
    <rect x="125" y="60" width="70" height="12" fill="#1a2332" rx="1"/>

    <!-- Passivation on mask top -->
    <rect x="20" y="56" width="70" height="4" fill="#40a0a0" rx="1"/>
    <rect x="125" y="56" width="70" height="4" fill="#40a0a0" rx="1"/>

    <!-- Etch cavity -->
    <ellipse cx="107" cy="72" rx="46" ry="25" fill="#fafbfc"/>

    <!-- Sidewall passivation (left and right arcs only) -->
    <!-- Left sidewall -->
    <path d="M65,65 Q61,72 63,85 Q65,95 72,97" fill="none" stroke="#40a0a0" stroke-width="4.5"/>
    <!-- Right sidewall -->
    <path d="M149,65 Q153,72 151,85 Q149,95 142,97" fill="none" stroke="#40a0a0" stroke-width="4.5"/>

    <!-- Exposed bottom (no passivation) - light yellow -->
    <ellipse cx="107" cy="95" rx="30" ry="5" fill="#fff8d0" stroke="#d4c060" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="107" y="108" text-anchor="middle" font-size="6.5" fill="#998830">暴露Si / Exposed Si</text>

    <!-- Ion bombardment arrows (vertical) -->
    <line x1="95" y1="38" x2="95" y2="60" stroke="#e06040" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <line x1="107" y1="36" x2="107" y2="58" stroke="#e06040" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <line x1="119" y1="38" x2="119" y2="60" stroke="#e06040" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <line x1="101" y1="37" x2="101" y2="59" stroke="#e06040" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <line x1="113" y1="37" x2="113" y2="59" stroke="#e06040" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

    <text x="140" y="43" font-size="7.5" fill="#e06040" font-weight="bold">Ar⁺/SF₆⁺</text>

    <!-- Sidewall label -->
    <line x1="50" y1="80" x2="61" y2="80" stroke="#2d7a7a" stroke-width="0.8"/>
    <text x="25" y="78" font-size="6.5" fill="#2d7a7a">侧壁</text>
    <text x="25" y="86" font-size="6" fill="#2d7a7a">钝化</text>
  </g>

  <!-- ============================================================ -->
  <!-- PANEL 4: Next Etch Cycle -->
  <!-- ============================================================ -->
  <g transform="translate(705, 35)">
    <rect width="215" height="185" fill="#f4f6f8" stroke="#bcc4cc" stroke-width="1" rx="4"/>
    <text x="107" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a2332">④ 下一刻蚀循环</text>
    <text x="107" y="31" text-anchor="middle" font-size="8.5" fill="#556677">Next Etch Cycle</text>

    <!-- Si substrate -->
    <rect x="20" y="70" width="175" height="105" fill="#889098" rx="2"/>
    <text x="107" y="165" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">Si</text>

    <!-- Mask -->
    <rect x="20" y="60" width="70" height="12" fill="#1a2332" rx="1"/>
    <rect x="125" y="60" width="70" height="12" fill="#1a2332" rx="1"/>

    <!-- Upper scallop (first cycle) -->
    <ellipse cx="107" cy="72" rx="42" ry="20" fill="#fafbfc"/>
    <!-- Deeper etch (second cycle) - slightly narrower due to sidewall passivation -->
    <rect x="72" y="82" width="70" height="28" fill="#fafbfc"/>
    <ellipse cx="107" cy="110" rx="35" ry="18" fill="#fafbfc"/>

    <!-- Scallop features on sidewalls -->
    <!-- Left scallops -->
    <path d="M72,82 Q68,76 72,70" fill="none" stroke="#889098" stroke-width="1.2"/>
    <path d="M72,100 Q68,92 72,84" fill="none" stroke="#889098" stroke-width="1.2"/>
    <!-- Right scallops -->
    <path d="M142,82 Q146,76 142,70" fill="none" stroke="#889098" stroke-width="1.2"/>
    <path d="M142,100 Q146,92 142,84" fill="none" stroke="#889098" stroke-width="1.2"/>

    <!-- Sidewall passivation on upper part -->
    <line x1="69" y1="68" x2="69" y2="100" stroke="#40a0a0" stroke-width="3.5"/>
    <line x1="145" y1="68" x2="145" y2="100" stroke="#40a0a0" stroke-width="3.5"/>

    <!-- Etch front at bottom -->
    <ellipse cx="107" cy="110" rx="35" ry="18" fill="none" stroke="#f0a050" stroke-width="2" stroke-dasharray="4,3" opacity="0.8"/>

    <!-- SF6 arrows into the trench -->
    <line x1="100" y1="62" x2="100" y2="78" stroke="#f0a050" stroke-width="1.3" marker-end="url(#arrowOrange)"/>
    <line x1="107" y1="62" x2="107" y2="78" stroke="#f0a050" stroke-width="1.3" marker-end="url(#arrowOrange)"/>
    <line x1="114" y1="62" x2="114" y2="78" stroke="#f0a050" stroke-width="1.3" marker-end="url(#arrowOrange)"/>

    <text x="107" y="46" text-anchor="middle" font-size="8" fill="#c07030" font-weight="bold">SF&#x2086;*</text>

    <!-- Scallop label -->
    <line x1="150" y1="85" x2="170" y2="78" stroke="#556677" stroke-width="0.7"/>
    <text x="155" y="75" font-size="6.5" fill="#556677">扇贝纹</text>
    <text x="155" y="83" font-size="5.5" fill="#888">Scalloping</text>
  </g>

  <!-- ============================================================ -->
  <!-- Repeat Arrow from Panel 4 back to Panel 1 -->
  <!-- ============================================================ -->
  <path d="M870,225 Q890,225 890,235 Q890,245 870,245 L80,245 Q60,245 60,235 Q60,225 80,225"
        fill="none" stroke="#3366aa" stroke-width="2" marker-end="url(#arrowRepeat)"/>
  <rect x="420" y="233" width="110" height="18" fill="#fafbfc" rx="3"/>
  <text x="475" y="246" text-anchor="middle" font-size="10" fill="#3366aa" font-weight="bold">&#x91CD;&#x590D; (Repeat)</text>

  <!-- ============================================================ -->
  <!-- FINAL RESULT: Deep Trench After Many Cycles -->
  <!-- ============================================================ -->
  <g transform="translate(200, 265)">
    <rect x="-5" y="-5" width="560" height="180" fill="#f0f2f4" stroke="#aab4be" stroke-width="1.2" rx="5"/>
    <text x="275" y="14" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2332">最终结果 — Final Result: Deep High-Aspect-Ratio Trench</text>

    <!-- Si block -->
    <rect x="170" y="28" width="210" height="130" fill="#889098" rx="2"/>

    <!-- Mask on top -->
    <rect x="170" y="24" width="80" height="8" fill="#1a2332" rx="1"/>
    <rect x="300" y="24" width="80" height="8" fill="#1a2332" rx="1"/>
    <text x="210" y="22" text-anchor="middle" font-size="7" fill="#1a2332">Mask</text>

    <!-- Deep trench -->
    <rect x="255" y="32" width="40" height="120" fill="#fafbfc"/>

    <!-- Scalloped sidewalls (left) -->
    <path d="M255,35 Q251,40 255,45 Q251,50 255,55 Q251,60 255,65 Q251,70 255,75 Q251,80 255,85 Q251,90 255,95 Q251,100 255,105 Q251,110 255,115 Q251,120 255,125 Q251,130 255,135 Q251,140 255,145 Q251,148 255,152"
          fill="none" stroke="#889098" stroke-width="1.5"/>

    <!-- Scalloped sidewalls (right) -->
    <path d="M295,35 Q299,40 295,45 Q299,50 295,55 Q299,60 295,65 Q299,70 295,75 Q299,80 295,85 Q299,90 295,95 Q299,100 295,105 Q299,110 295,115 Q299,120 295,125 Q299,130 295,135 Q299,140 295,145 Q299,148 295,152"
          fill="none" stroke="#889098" stroke-width="1.5"/>

    <!-- Dimension arrows -->
    <!-- Depth arrow -->
    <line x1="315" y1="32" x2="315" y2="152" stroke="#333" stroke-width="0.8"/>
    <line x1="311" y1="32" x2="319" y2="32" stroke="#333" stroke-width="0.8"/>
    <line x1="311" y1="152" x2="319" y2="152" stroke="#333" stroke-width="0.8"/>
    <text x="330" y="95" font-size="8" fill="#333" transform="rotate(90, 330, 95)">深度 Depth</text>

    <!-- Width arrow -->
    <line x1="255" y1="160" x2="295" y2="160" stroke="#333" stroke-width="0.8"/>
    <line x1="255" y1="156" x2="255" y2="164" stroke="#333" stroke-width="0.8"/>
    <line x1="295" y1="156" x2="295" y2="164" stroke="#333" stroke-width="0.8"/>
    <text x="275" y="170" text-anchor="middle" font-size="7" fill="#333">宽度 Width</text>

    <!-- Scallop detail callout -->
    <circle cx="252" cy="75" r="12" fill="none" stroke="#cc5533" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="241" y1="72" x2="150" y2="55" stroke="#cc5533" stroke-width="0.8"/>
    <!-- Magnified scallop -->
    <rect x="80" y="38" width="70" height="50" fill="#fff" stroke="#cc5533" stroke-width="1" rx="3"/>
    <text x="115" y="48" text-anchor="middle" font-size="6.5" fill="#cc5533" font-weight="bold">扇贝细节</text>
    <text x="115" y="56" text-anchor="middle" font-size="5.5" fill="#888">Scallop Detail</text>
    <!-- Magnified scallop shape -->
    <path d="M95,65 Q88,70 95,75 Q88,80 95,85" fill="none" stroke="#889098" stroke-width="2"/>
    <line x1="97" y1="65" x2="97" y2="85" stroke="#40a0a0" stroke-width="2.5"/>
    <text x="105" y="72" font-size="5.5" fill="#2d7a7a">钝化</text>
    <text x="105" y="80" font-size="5.5" fill="#889098">Si</text>
    <!-- ~100nm label -->
    <line x1="130" y1="66" x2="130" y2="76" stroke="#333" stroke-width="0.5"/>
    <text x="138" y="73" font-size="5" fill="#333">~100 nm</text>

    <!-- Si label -->
    <text x="210" y="100" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Si</text>
    <text x="340" y="100" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Si</text>

    <!-- Parameters text -->
    <text x="275" y="163" text-anchor="middle" font-size="0" fill="transparent">spacer</text>
  </g>

  <!-- Parameters below the result panel -->
  <text x="475" y="435" text-anchor="middle" font-size="10" fill="#334455" font-weight="bold">典型参数: 深度 &gt;500 &#x00B5;m, 纵横比 &gt;50:1, 扇贝深度 ~100 nm</text>
  <text x="475" y="447" text-anchor="middle" font-size="8" fill="#778899">Typical Parameters: Depth &gt;500 &#x00B5;m, Aspect Ratio &gt;50:1, Scallop Depth ~100 nm</text>
</svg>