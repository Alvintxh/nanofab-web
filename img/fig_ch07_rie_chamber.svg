<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
    <!-- Technical grid pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#2a3a4d" stroke-width="0.3" opacity="0.5"/>
    </pattern>

    <!-- Chamber wall fill -->
    <linearGradient id="wallGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f1822"/>
      <stop offset="50%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0f1822"/>
    </linearGradient>

    <!-- Electrode metallic gradient -->
    <linearGradient id="electrodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0b0c0"/>
      <stop offset="50%" stop-color="#8899aa"/>
      <stop offset="100%" stop-color="#6a7a8a"/>
    </linearGradient>

    <!-- Plasma glow radial gradient -->
    <radialGradient id="plasmaGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#3a7edf" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2a5ebf" stop-opacity="0.05"/>
    </radialGradient>

    <!-- Dark space sheath gradient (top) -->
    <linearGradient id="sheathTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2332" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2a4060" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Dark space sheath gradient (bottom) -->
    <linearGradient id="sheathBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a4060" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#1a2332" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Ion arrow marker -->
    <marker id="ionArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f0a050"/>
    </marker>

    <!-- Product arrow marker (going to pump) -->
    <marker id="productArrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#80d080"/>
    </marker>

    <!-- Gas flow arrow marker -->
    <marker id="gasArrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#70b8ff"/>
    </marker>

    <!-- RF symbol filter -->
    <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Plasma particle glow -->
    <filter id="particleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="500" fill="#0d1520"/>
  <rect width="600" height="500" fill="url(#grid)"/>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="16" font-weight="bold" fill="#c0d0e8">反应离子刻蚀 (Reactive Ion Etching) 腔室截面</text>

  <!-- ==================== CHAMBER BODY ==================== -->
  <!-- Outer chamber walls -->
  <rect x="100" y="55" width="400" height="340" rx="6" fill="url(#wallGrad)" stroke="#3a5060" stroke-width="2.5"/>

  <!-- Inner chamber cavity -->
  <rect x="120" y="75" width="360" height="300" rx="3" fill="#0a1018" stroke="#2a3a4d" stroke-width="1"/>

  <!-- ==================== TOP ELECTRODE (ANODE) ==================== -->
  <rect x="155" y="80" width="290" height="14" rx="2" fill="url(#electrodeGrad)" stroke="#5a6a7a" stroke-width="0.8"/>
  <!-- Ground symbol on anode -->
  <line x1="300" y1="75" x2="300" y2="62" stroke="#8899aa" stroke-width="1.5"/>
  <line x1="288" y1="62" x2="312" y2="62" stroke="#8899aa" stroke-width="2"/>
  <line x1="292" y1="58" x2="308" y2="58" stroke="#8899aa" stroke-width="1.5"/>
  <line x1="296" y1="54" x2="304" y2="54" stroke="#8899aa" stroke-width="1"/>

  <!-- Anode label -->
  <text x="460" y="92" font-family="'Noto Sans SC', sans-serif" font-size="11" fill="#a0b8d0">阳极 (Anode)</text>

  <!-- ==================== GAS INLET ==================== -->
  <!-- Gas inlet pipe -->
  <rect x="190" y="45" width="12" height="36" fill="#1a2332" stroke="#3a5060" stroke-width="1.5"/>
  <rect x="380" y="45" width="12" height="36" fill="#1a2332" stroke="#3a5060" stroke-width="1.5"/>
  <!-- Gas holes in top electrode -->
  <circle cx="196" cy="87" r="2" fill="#2a4060"/>
  <circle cx="386" cy="87" r="2" fill="#2a4060"/>
  <!-- Gas flow arrows -->
  <line x1="196" y1="48" x2="196" y2="78" stroke="#70b8ff" stroke-width="1.2" marker-end="url(#gasArrow)" opacity="0.8"/>
  <line x1="386" y1="48" x2="386" y2="78" stroke="#70b8ff" stroke-width="1.2" marker-end="url(#gasArrow)" opacity="0.8"/>
  <!-- Gas inlet label -->
  <text x="260" y="46" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#70b8ff">气体入口 (Gas Inlet)</text>

  <!-- ==================== DARK SPACE / SHEATH (TOP) ==================== -->
  <rect x="122" y="94" width="356" height="30" fill="url(#sheathTop)" opacity="0.7"/>
  <text x="485" y="112" font-family="'Noto Sans SC', sans-serif" font-size="8" fill="#5a7a9a" text-anchor="end">暗区</text>

  <!-- ==================== PLASMA GLOW REGION ==================== -->
  <rect x="122" y="124" width="356" height="150" fill="url(#plasmaGlow)"/>
  <!-- Additional glow layers for depth -->
  <ellipse cx="300" cy="199" rx="160" ry="65" fill="#4a9eff" opacity="0.08"/>
  <ellipse cx="300" cy="199" rx="120" ry="45" fill="#5ab0ff" opacity="0.1"/>

  <!-- Plasma particles / species -->
  <g filter="url(#particleGlow)" opacity="0.7">
    <!-- Ions (+) -->
    <circle cx="220" cy="160" r="3" fill="#4a9eff" opacity="0.6"/>
    <text x="220" y="163" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#fff" font-weight="bold">+</text>
    <circle cx="350" cy="180" r="3" fill="#4a9eff" opacity="0.6"/>
    <text x="350" y="183" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#fff" font-weight="bold">+</text>
    <circle cx="280" cy="210" r="3" fill="#4a9eff" opacity="0.6"/>
    <text x="280" y="213" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#fff" font-weight="bold">+</text>
    <circle cx="180" cy="195" r="3" fill="#4a9eff" opacity="0.5"/>
    <text x="180" y="198" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#fff" font-weight="bold">+</text>
    <circle cx="400" cy="155" r="3" fill="#4a9eff" opacity="0.5"/>
    <text x="400" y="158" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#fff" font-weight="bold">+</text>

    <!-- Radicals (*) -->
    <circle cx="250" cy="175" r="3.5" fill="#60d890" opacity="0.5"/>
    <text x="250" y="178" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">*</text>
    <circle cx="330" cy="225" r="3.5" fill="#60d890" opacity="0.5"/>
    <text x="330" y="228" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">*</text>
    <circle cx="370" cy="150" r="3.5" fill="#60d890" opacity="0.4"/>
    <text x="370" y="153" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">*</text>
    <circle cx="200" cy="230" r="3.5" fill="#60d890" opacity="0.4"/>
    <text x="200" y="233" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">*</text>
  </g>

  <!-- Plasma label -->
  <text x="300" y="202" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="13" fill="#7ac0ff" font-weight="bold" opacity="0.9">等离子体 (Plasma)</text>

  <!-- Radical species label -->
  <text x="145" y="178" font-family="'Noto Sans SC', sans-serif" font-size="9" fill="#60d890" transform="rotate(-90, 145, 178)">活性基团 (Radicals)</text>

  <!-- ==================== DARK SPACE / SHEATH (BOTTOM) ==================== -->
  <rect x="122" y="274" width="356" height="40" fill="url(#sheathBottom)" opacity="0.8"/>
  <text x="485" y="297" font-family="'Noto Sans SC', sans-serif" font-size="8" fill="#5a7a9a" text-anchor="end">暗区 (Sheath)</text>

  <!-- ==================== ION BOMBARDMENT ARROWS ==================== -->
  <g>
    <line x1="230" y1="250" x2="230" y2="300" stroke="#f0a050" stroke-width="1.5" marker-end="url(#ionArrow)"/>
    <line x1="265" y1="245" x2="265" y2="300" stroke="#f0a050" stroke-width="1.5" marker-end="url(#ionArrow)"/>
    <line x1="300" y1="248" x2="300" y2="300" stroke="#f0a050" stroke-width="1.5" marker-end="url(#ionArrow)"/>
    <line x1="335" y1="252" x2="335" y2="300" stroke="#f0a050" stroke-width="1.5" marker-end="url(#ionArrow)"/>
    <line x1="370" y1="246" x2="370" y2="300" stroke="#f0a050" stroke-width="1.5" marker-end="url(#ionArrow)"/>
  </g>
  <!-- Ion bombardment label -->
  <text x="300" y="245" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#f0a050" font-weight="bold">离子轰击 (Ion Bombardment)</text>

  <!-- ==================== SAMPLE / WAFER ==================== -->
  <!-- Wafer -->
  <rect x="210" y="305" width="180" height="8" rx="1" fill="#556688" stroke="#7788aa" stroke-width="0.5"/>
  <!-- Photoresist/pattern on wafer -->
  <rect x="235" y="301" width="20" height="4" fill="#cc8844" opacity="0.7"/>
  <rect x="275" y="301" width="20" height="4" fill="#cc8844" opacity="0.7"/>
  <rect x="315" y="301" width="20" height="4" fill="#cc8844" opacity="0.7"/>
  <rect x="355" y="301" width="20" height="4" fill="#cc8844" opacity="0.7"/>
  <!-- Sample label -->
  <text x="300" y="325" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#c0d0e0">样品 (Sample)</text>

  <!-- ==================== BOTTOM ELECTRODE (CATHODE) ==================== -->
  <rect x="155" y="313" width="290" height="16" rx="2" fill="url(#electrodeGrad)" stroke="#5a6a7a" stroke-width="0.8"/>
  <!-- Cathode label -->
  <text x="460" y="326" font-family="'Noto Sans SC', sans-serif" font-size="11" fill="#a0b8d0">阴极 (Cathode)</text>

  <!-- ==================== VOLATILE PRODUCTS ==================== -->
  <!-- Products going toward pump -->
  <line x1="200" y1="310" x2="145" y2="355" stroke="#80d080" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#productArrow)" opacity="0.7"/>
  <line x1="390" y1="310" x2="440" y2="355" stroke="#80d080" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#productArrow)" opacity="0.7"/>
  <text x="445" y="345" font-family="'Noto Sans SC', sans-serif" font-size="8" fill="#80d080">挥发性产物</text>
  <text x="445" y="355" font-family="sans-serif" font-size="7" fill="#80d080">(Volatile Products)</text>

  <!-- ==================== VACUUM PUMP PORT ==================== -->
  <!-- Pump port opening -->
  <rect x="130" y="360" width="40" height="15" rx="2" fill="#0a1018" stroke="#3a5060" stroke-width="1.5"/>
  <!-- Pump pipe -->
  <rect x="105" y="362" width="30" height="11" fill="#1a2332" stroke="#3a5060" stroke-width="1.5"/>
  <!-- Pump body -->
  <rect x="60" y="355" width="48" height="25" rx="4" fill="#2a3a4d" stroke="#4a6070" stroke-width="1.2"/>
  <text x="84" y="371" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8899aa" font-weight="bold">PUMP</text>
  <!-- Pump label -->
  <text x="84" y="395" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#8a9ab0">真空泵</text>
  <text x="84" y="406" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6a7a8a">(Vacuum Pump)</text>

  <!-- ==================== RF POWER SUPPLY ==================== -->
  <!-- Connection from cathode -->
  <line x1="300" y1="329" x2="300" y2="360" stroke="#8899aa" stroke-width="1.5"/>
  <line x1="300" y1="360" x2="300" y2="395" stroke="#8899aa" stroke-width="1.5"/>

  <!-- Blocking capacitor symbol -->
  <line x1="290" y1="360" x2="310" y2="360" stroke="#c8a040" stroke-width="2"/>
  <line x1="290" y1="365" x2="310" y2="365" stroke="#c8a040" stroke-width="2"/>
  <text x="318" y="365" font-family="sans-serif" font-size="7" fill="#c8a040">C</text>

  <!-- RF source box -->
  <rect x="265" y="395" width="70" height="35" rx="4" fill="#2a3a4d" stroke="#4a6a90" stroke-width="1.5"/>
  <!-- RF sine wave symbol -->
  <path d="M278,412 Q285,402 292,412 Q299,422 306,412 Q313,402 320,412" fill="none" stroke="#f0a050" stroke-width="1.5" filter="url(#glowFilter)"/>
  <!-- RF label -->
  <text x="300" y="443" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#f0a050">射频电源 (RF Power)</text>
  <text x="300" y="455" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#c08030">13.56 MHz</text>

  <!-- Ground return from RF -->
  <line x1="335" y1="412" x2="370" y2="412" stroke="#8899aa" stroke-width="1"/>
  <line x1="370" y1="412" x2="370" y2="380" stroke="#8899aa" stroke-width="1"/>
  <!-- Ground symbol -->
  <line x1="362" y1="380" x2="378" y2="380" stroke="#8899aa" stroke-width="1.5"/>
  <line x1="365" y1="377" x2="375" y2="377" stroke="#8899aa" stroke-width="1"/>
  <line x1="367" y1="374" x2="373" y2="374" stroke="#8899aa" stroke-width="0.8"/>

  <!-- ==================== SELF-BIAS VOLTAGE ==================== -->
  <!-- V_dc indicator -->
  <g>
    <!-- Voltage bracket on left side of cathode -->
    <line x1="140" y1="313" x2="135" y2="313" stroke="#e0c060" stroke-width="1"/>
    <line x1="135" y1="313" x2="135" y2="329" stroke="#e0c060" stroke-width="1"/>
    <line x1="140" y1="329" x2="135" y2="329" stroke="#e0c060" stroke-width="1"/>
    <!-- Minus sign near cathode -->
    <text x="128" y="318" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e0c060" font-weight="bold">-</text>
    <!-- Plus sign near anode region -->
    <text x="128" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e0c060" font-weight="bold">+</text>
    <!-- V_dc arrow -->
    <line x1="128" y1="105" x2="128" y2="310" stroke="#e0c060" stroke-width="1" stroke-dasharray="4,3"/>
    <!-- V_dc label -->
    <text x="110" y="205" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#e0c060" transform="rotate(-90, 110, 205)">自偏压 V_dc (Self-bias)</text>
  </g>

  <!-- ==================== DIMENSION / ANNOTATION ==================== -->
  <!-- Scale reference line -->
  <line x1="510" y1="470" x2="580" y2="470" stroke="#4a6070" stroke-width="0.8"/>
  <line x1="510" y1="467" x2="510" y2="473" stroke="#4a6070" stroke-width="0.8"/>
  <line x1="580" y1="467" x2="580" y2="473" stroke="#4a6070" stroke-width="0.8"/>
  <text x="545" y="480" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#4a6070">~30 cm</text>

  <!-- Figure caption -->
  <text x="300" y="490" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="9" fill="#5a7a9a">图 7.x  RIE 反应离子刻蚀腔室截面示意图</text>
</svg>